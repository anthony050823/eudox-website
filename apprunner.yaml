version: 1.0
runtime: NODEJS_22

build:
  commands:
    pre-build:
      - npm install -g pnpm@10.4.1
      - pnpm install --frozen-lockfile
    build:
      - pnpm build
  env:
    - name: NODE_ENV
      value: production

run:
  command: node dist/index.js
  network:
    port: 3000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
  # Sensitive env vars (DATABASE_URL, JWT_SECRET, etc.) are set in the
  # App Runner console under "Environment variables" — do not put them here.

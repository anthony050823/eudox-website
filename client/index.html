<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Eudox AI</title>
    
    <!-- SEO Meta Tags -->

    <meta property="og:type" content="website" />

    <meta property="og:title" content="Eudox AI - Autonomous Deal Sourcing Platform" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

    <meta property="twitter:description" content="Stop searching. Start discovering. The first AI agent engineered to proactively find private market opportunities before they hit the market." />
    <meta property="twitter:image" content="https://eudox.ai/logo.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

     <link rel="preload" href="/images/universities/emory-university.png" as="image">
